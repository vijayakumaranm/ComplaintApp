<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 8px; width: 360px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { margin-bottom: 20px; text-align: center; color: #333; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #555; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        button { width: 100%; padding: 10px; background: #4a90e2; color: white; border: none; border-radius: 5px; font-size: 15px; cursor: pointer; }
        button:hover { background: #357abd; }
        .msg { margin-top: 12px; text-align: center; font-size: 14px; }
        .error { color: red; }
        .success { color: green; }
        .link { margin-top: 15px; text-align: center; font-size: 14px; }
        .link a { color: #4a90e2; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <h2>Login</h2>
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter email" />
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" />
    <button onclick="login()">Login</button>
    <div class="msg" id="msg"></div>
    <div class="link"><a href="register.html">Don't have an account? Register</a></div>
</div>
<script>
    async function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const msg = document.getElementById('msg');

        if (!email || !password) {
            msg.className = 'msg error';
            msg.textContent = 'Email and password are required';
            return;
        }

        const response = await fetch('/api/users/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
            localStorage.setItem('userId', data.userId);
            localStorage.setItem('name', data.name);
            localStorage.setItem('role', data.role);

            if (data.role === 'ADMIN') {
                window.location.href = 'admin.html';
            } else {
                window.location.href = 'complaints.html';
            }
        } else {
            msg.className = 'msg error';
            msg.textContent = data.message;
        }
    }
</script>
</body>
</html>
