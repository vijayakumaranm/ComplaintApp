<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Complaints</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .navbar { background: #4a90e2; padding: 15px 30px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .navbar span { font-size: 16px; }
        .navbar button { background: white; color: #4a90e2; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; }
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 25px; }
        h3 { margin-bottom: 15px; color: #333; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #555; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        textarea { resize: vertical; height: 80px; }
        button { padding: 10px 20px; background: #4a90e2; color: white; border: none; border-radius: 5px; font-size: 14px; cursor: pointer; }
        button:hover { background: #357abd; }
        .msg { margin-top: 10px; font-size: 14px; }
        .error { color: red; }
        .success { color: green; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #4a90e2; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .Open { background: #fff3cd; color: #856404; }
        .In-Progress { background: #cce5ff; color: #004085; }
        .Resolved { background: #d4edda; color: #155724; }
        .Rejected { background: #f8d7da; color: #721c24; }
        .empty { text-align: center; color: #999; padding: 20px; }
    </style>
</head>
<body>
<div class="navbar">
    <span>Complaint Management</span>
    <span>Welcome, <b id="userName"></b> &nbsp;
        <button onclick="logout()">Logout</button>
    </span>
</div>
<div class="container">
    <div class="card">
        <h3>Raise a Complaint</h3>
        <label>Title</label>
        <input type="text" id="title" placeholder="Enter complaint title" />
        <label>Description</label>
        <textarea id="description" placeholder="Enter detailed description"></textarea>
        <label>Category</label>
        <select id="category">
            <option value="">-- Select Category --</option>
            <option>Water</option>
            <option>Electricity</option>
            <option>Roads</option>
            <option>Sanitation</option>
            <option>Other</option>
        </select>
        <button onclick="raiseComplaint()">Submit Complaint</button>
        <div class="msg" id="msg"></div>
    </div>

    <div class="card">
        <h3>My Complaints</h3>
        <table id="complaintsTable">
            <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Category</th>
                <th>Status</th>
                <th>Raised On</th>
            </tr>
            </thead>
            <tbody id="complaintsBody">
            <tr><td colspan="5" class="empty">No complaints found</td></tr>
            </tbody>
        </table>
    </div>
</div>
<script>
    const userId = localStorage.getItem('userId');
    const name = localStorage.getItem('name');

    if (!userId) window.location.href = 'login.html';

    document.getElementById('userName').textContent = name;

    async function raiseComplaint() {
        const title = document.getElementById('title').value.trim();
        const description = document.getElementById('description').value.trim();
        const category = document.getElementById('category').value;
        const msg = document.getElementById('msg');

        if (!title || !description || !category) {
            msg.className = 'msg error';
            msg.textContent = 'All fields are required';
            return;
        }

        const response = await fetch(`/api/complaints?userId=${userId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, description, category })
        });

        const data = await response.json();

        if (data.success) {
            msg.className = 'msg success';
            msg.textContent = 'Complaint submitted successfully';
            document.getElementById('title').value = '';
            document.getElementById('description').value = '';
            document.getElementById('category').value = '';
            loadComplaints();
        } else {
            msg.className = 'msg error';
            msg.textContent = data.message;
        }
    }

    async function loadComplaints() {
        const response = await fetch(`/api/complaints/my/${userId}`);
        const data = await response.json();
        const tbody = document.getElementById('complaintsBody');

        if (!data.complaints || data.complaints.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty">No complaints found</td></tr>';
            return;
        }

        tbody.innerHTML = data.complaints.map(c => {
            const statusName = c.status.statusName.replace(' ', '-');
            const date = new Date(c.createdAt).toLocaleDateString();
            return `<tr>
                <td>${c.id}</td>
                <td>${c.title}</td>
                <td>${c.category}</td>
                <td><span class="badge ${statusName}">${c.status.statusName}</span></td>
                <td>${date}</td>
            </tr>`;
        }).join('');
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    loadComplaints();
</script>
</body>
</html>
